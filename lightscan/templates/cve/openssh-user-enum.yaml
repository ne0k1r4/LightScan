id: openssh-user-enum
name: OpenSSH Username Enumeration
severity: medium
cve: CVE-2018-15473
tags: [ssh, openssh, enumeration, auth]
port: 22
protocol: tcp
description: OpenSSH < 7.7 allows remote attackers to enumerate valid usernames
remediation: Upgrade OpenSSH >= 7.7
reference: https://nvd.nist.gov/vuln/detail/CVE-2018-15473
steps:
  - type: send
    data: ""
  - type: match
    regex: "OpenSSH_[0-6]\\.|OpenSSH_7\\.[0-6]"
  - type: extract
    regex: "OpenSSH_([0-9.]+)"
    group: 1
    name: version
