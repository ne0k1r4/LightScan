id: apache-struts-rce
name: Apache Struts OGNL RCE
severity: critical
cve: CVE-2017-5638
tags: [apache, struts, ognl, rce, java]
port: 80
protocol: http
description: Apache Struts 2 Content-Type OGNL injection — unauthenticated RCE
remediation: Upgrade Struts >= 2.3.32 or 2.5.10.1
reference: https://nvd.nist.gov/vuln/detail/CVE-2017-5638
steps:
  - type: send
    data: /
  - type: match
    regex: "(struts|apache|java)"
    part: headers
